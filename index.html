      --color-border-danger: #f8b4b4;

      --color-text-info: #1d4ed8;
      --border-radius-md: 6px;
      --border-radius-lg: 12px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --color-background-primary: #18191a;
        --color-background-secondary: #242526;
        --color-border-primary: #a9a2e6;
        --color-border-secondary: #3e4042;
        --color-border-tertiary: #2f3031;

    .tab.active { background: var(--color-background-secondary); color: var(--color-text-primary); border-color: var(--color-border-primary); }
    .section { display: none; }

    .side-btn { flex: 1; padding: 9px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: transparent; cursor: pointer; font-size: 13px; font-weight: 500; color: var(--color-text-secondary); }
    .side-btn.atk-on { background: #faeeda; border-color: #ba7517; color: #633806; }
    .side-btn.def-on { background: #e1f5ee; border-color: #0f6e56; color: #085041; }
    @media(prefers-color-scheme:dark){
      .side-btn.atk-on { background: #633806; border-color: #ef9f27; color: #fac775; }
      .side-btn.def-on { background: #085041; border-color: #1d9e75; color: #9fe1cb; }

    .cats { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 8px; }

    .ops-box { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 5px; max-height: 170px; overflow-y: auto; padding: 6px; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); background: var(--color-background-primary); }
    .chip { display: flex; align-items: center; gap: 6px; padding: 5px 8px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); font-size: 12px; cursor: pointer; color: var(--color-text-secondary); background: transparent; user-select: none; }
    .chip img { width: 16px; height: 16px; object-fit: contain; flex-shrink: 0; }
    
    .op-avatar-placeholder { width: 16px; height: 16px; border-radius: 3px; background: #e2e5e8; font-size: 9px; font-weight: bold; display: flex; align-items: center; justify-content: center; text-transform: uppercase; color: #1c1e21; flex-shrink: 0; }
    @media(prefers-color-scheme:dark){ .op-avatar-placeholder { background: #3e4042; color: #e4e6eb; } }

    .chip.sel-atk { background: #faeeda; border-color: #ba7517; color: #633806; }
    .chip.sel-def { background: #e1f5ee; border-color: #0f6e56; color: #085041; }
    @media(prefers-color-scheme:dark){
      .chip.sel-atk { background: #633806; border-color: #ef9f27; color: #fac775; }
      .chip.sel-def { background: #085041; border-color: #1d9e75; color: #9fe1cb; }

    .btn-danger { color: var(--color-text-danger); border-color: var(--color-border-danger); }

    .badge { font-size: 11px; padding: 3px 8px; border-radius: var(--border-radius-md); }
    .b-atk { background: #faeeda; color: #633806; } 
    .b-def { background: #e1f5ee; color: #085041; }

    .b-obj { background: #fff3cd; color: #856404; border: 0.5px solid #ffeeba; }
    @media(prefers-color-scheme:dark){ .b-obj { background: #856404; color: #fff3cd; border-color: #634a03; } }
    .b-op { display: inline-flex; align-items: center; gap: 4px; background: #eeedfe; color: #3c3489; }
    .b-op img { width: 14px; height: 14px; object-fit: contain; }
    @media(prefers-color-scheme:dark){

<body>

<h2 class="sr-only">Rainbow Six Siege strat library</h2>
<div class="app">
  <div class="tabs">
    <button class="tab active" data-tab="find"><i class="ti ti-search" aria-hidden="true"></i> Find strat</button>
    <button class="tab" data-tab="add"><i class="ti ti-plus" aria-hidden="true"></i> Add strat</button>
    <button class="tab" data-tab="all"><i class="ti ti-list" aria-hidden="true"></i> All strats <span class="count-pill" id="total-count">0</span></button>
  </div>

  <div id="tab-find" class="section active">
    <div class="filter-wrap">
      <div class="row2" style="margin-bottom:12px">
        <div><label class="lbl">Map</label><select id="find-map"></select></div>
        <div><label class="lbl">Objective / Bomb Site</label><select id="find-obj" disabled><option value="">Select a map first</option></select></div>
      </div>
      <div class="row2" style="margin-bottom:12px">
        <div style="grid-column: span 2"><label class="lbl">Side</label>
          <div class="side-row">
            <button class="side-btn" id="find-atk" data-side="attack">Attack</button>
            <button class="side-btn" id="find-def" data-side="defense">Defense</button>
          </div>
        </div>
      </div>
      <div class="add-section">
        <div class="ops-header">
          <label class="lbl" style="margin:0">Operators <span style="font-size:11px;color:var(--color-text-tertiary)">(optional)</span></label>
          <button class="clr-link" id="btn-clear-find-ops">Clear</button>
        </div>
        <div id="find-ops-hint" class="hint-txt">Select attack or defense to filter operators.</div>
        <div id="find-cats" class="cats" style="display:none"></div>
        <div class="ops-box" id="find-ops" style="display:none"></div>
      </div>
      <div style="display:flex;gap:8px;margin-top:4px">
        <button class="btn btn-primary" style="flex:1" id="btn-run-find">Find strats</button>
        <button class="btn" id="btn-clear-find">Reset</button>
      </div>
    </div>
    <div id="find-results"></div>
  </div>

  <div id="tab-add" class="section">
    <div class="add-wrap">
      <div class="add-section">
        <div class="step"><div class="step-num">1</div><span class="step-label">Paste the video link</span></div>
        <input type="text" id="add-url" placeholder="YouTube, Instagram, Reddit, TikTok — any URL" />
      </div>
      <div class="add-section">
        <div class="step"><div class="step-num">2</div><span class="step-label">Give it a title & upload an image (optional)</span></div>
        <input type="text" id="add-title" placeholder="e.g. 2F Armory plant strat with Thermite" style="margin-bottom: 8px;" />
        <input type="file" id="add-image-file" accept="image/*" />
      </div>
      <hr class="divider"/>
      <div class="add-section">
        <div class="step"><div class="step-num">3</div><span class="step-label">Pick the map & objective</span></div>
        <div class="row2" style="margin-bottom:0">
          <div><select id="add-map"></select></div>
          <div><select id="add-obj" disabled><option value="">Select a map first</option></select></div>
        </div>
      </div>
      <div class="add-section">
        <div class="step"><div class="step-num">4</div><span class="step-label">Attack or defense?</span></div>
        <div class="side-row">
          <button class="side-btn" id="add-atk" data-side="attack">Attack</button>
          <button class="side-btn" id="add-def" data-side="defense">Defense</button>
        </div>
      </div>
      <div class="add-section">
        <div class="ops-header">
          <div class="step" style="margin:0"><div class="step-num">5</div><span class="step-label">Operators used (optional)</span></div>
          <button class="clr-link" id="btn-clear-add-ops">Clear</button>
        </div>
        <div id="add-ops-hint" class="hint-txt">Pick attack or defense first.</div>
        <div id="add-cats" class="cats" style="display:none"></div>
        <div class="ops-box" id="add-ops" style="display:none"></div>
      </div>
      <hr class="divider"/>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="btn btn-primary" style="flex:1" id="btn-save-strat"><i class="ti ti-device-floppy" aria-hidden="true"></i> Save strat</button>
        <button class="btn" id="btn-clear-add-form">Clear</button>
      </div>
      <p id="add-msg" style="font-size:13px;margin-top:8px;min-height:18px"></p>
    </div>
  </div>

  <div id="tab-all" class="section">
    <div id="all-list"></div>
  </div>
</div>

function opKey(name) {
  return name.toLowerCase().replace(/ø/g,'o').replace(/ã/g,'a').replace(/ä/g,'a').replace(/é/g,'e').replace(/\s+/g,'').replace(/[^a-z0-9]/g,'');
}

function iconUrl(name) {
  return `OperatorIcons/Scalable vector graphic (SVG)/${opKey(name)}.svg`;
}

function handleMissingIcon(imgElement, name) {
  imgElement.style.display = 'none';
  const placeholder = document.createElement('div');
  placeholder.className = 'op-avatar-placeholder';
  placeholder.textContent = name.substring(0, 2);
  imgElement.parentNode.insertBefore(placeholder, imgElement);
}

let strats=[], findSide='', addSide='';
let findSelOps=new Set(), addSelOps=new Set();
let findActiveCat='All', addActiveCat='All';

// LOAD DATA DIRECTLY FROM SUPABASE CLOUD
async function load(){
  try {
    const { data, error } = await supabaseClient.from('strats').select('*');
    if (error) throw error;
    
    if (data) {
      strats = data.map(row => JSON.parse(row.payload));
    }
  } catch(e) {
    console.error("Cloud database fetch failed. Using empty list.", e);
    strats = [];
  }
  populateMaps(); 
  renderAllList(); 
  updateCount();
}

function updateCount(){document.getElementById('total-count').textContent=strats.length;}

function populateMaps(){
  ['find-map','add-map'].forEach(id=>{
    const s=document.getElementById(id),v=s.value;
    s.innerHTML='<option value="">'+( id==='find-map'?'Any map':'Select map…')+'</option>';
    MAPS.forEach(m=>{const o=document.createElement('option');o.value=o.textContent=m;s.appendChild(o);});
    s.value=v;
  });
}

function updateObjectiveOptions(mapId, objId, isFilter) {
  const mapVal = document.getElementById(mapId).value;
  const objSelect = document.getElementById(objId);
  objSelect.innerHTML = '';
  
  if (!mapVal) {
    objSelect.disabled = true;
    objSelect.innerHTML = `<option value="">${isFilter ? 'Any objective' : 'Select a map first'}</option>`;
    return;
  }
  
  objSelect.disabled = false;
  objSelect.innerHTML = `<option value="">${isFilter ? 'Any objective' : 'Select objective…'}</option>`;
  
  const objectives = MAP_OBJECTIVES[mapVal] || [];
  objectives.forEach(obj => {
    const opt = document.createElement('option');
    opt.value = opt.textContent = obj;
    objSelect.appendChild(opt);
  });
}

function catsForSide(side){return side==='attack'?ATK_CATS:side==='defense'?DEF_CATS:null;}
function opsForSide(side){return side==='attack'?ATK_OPS:side==='defense'?DEF_OPS:[];}

function filteredOps(side, cat){
  const cats=catsForSide(side);
  if(!cats||cat==='All') return opsForSide(side);
  return (cats[cat]||[]).filter(op=>opsForSide(side).includes(op)).sort();
}

function renderCats(catsElId, hintElId, opsElId, side, activeCat, setCatFn){
  const cats=catsForSide(side);
  const catsEl=document.getElementById(catsElId);
  const hint=document.getElementById(hintElId);
  const opsEl=document.getElementById(opsElId);
  if(!side){hint.style.display='';catsEl.style.display='none';opsEl.style.display='none';return;}
  hint.style.display='none'; catsEl.style.display='flex'; opsEl.style.display='grid';
  catsEl.innerHTML='';
  ['All',...Object.keys(cats)].forEach(cat=>{
    const b=document.createElement('button');
    b.className='cat-btn'+(activeCat===cat?' active-cat':'');
    b.textContent=cat; 
    b.addEventListener('click', () => setCatFn(cat));
    catsEl.appendChild(b);
  });
}

function renderOps(opsElId, side, activeCat, selSet, toggleFn){
  const el=document.getElementById(opsElId);
  if(!side){el.style.display='none';return;}
  el.style.display='grid'; el.innerHTML='';
  filteredOps(side,activeCat).forEach(op=>{
    const d=document.createElement('div');
    const sel=selSet.has(op);
    const cls=sel?(side==='attack'?'sel-atk':'sel-def'):'';
    d.className='chip '+cls;
    
    const img = document.createElement('img');
    img.src = iconUrl(op);
    img.alt = "";
    img.addEventListener('error', () => handleMissingIcon(img, op));
    
    const label = document.createElement('span');
    label.textContent = op;
    
    d.appendChild(img);
    d.appendChild(label);
    d.addEventListener('click', () => toggleFn(op));
    el.appendChild(d);
  });
}

function setFindCat(cat){
  findActiveCat=cat;
  renderCats('find-cats','find-ops-hint','find-ops',findSide,findActiveCat,setFindCat);
  renderOps('find-ops',findSide,findActiveCat,findSelOps,toggleFindOp);
}
function setAddCat(cat){
  addActiveCat=cat;
  renderCats('add-cats','add-ops-hint','add-ops',addSide,addActiveCat,setAddCat);
  renderOps('add-ops',addSide,addActiveCat,addSelOps,toggleAddOp);
}

function toggleFindSide(s){
  findSide=findSide===s?'':s;
  document.getElementById('find-atk').className='side-btn'+(findSide==='attack'?' atk-on':'');
  document.getElementById('find-def').className='side-btn'+(findSide==='defense'?' def-on':'');
  findSelOps.clear(); findActiveCat='All';
  renderCats('find-cats','find-ops-hint','find-ops',findSide,findActiveCat,setFindCat);
  renderOps('find-ops',findSide,findActiveCat,findSelOps,toggleFindOp);
}
function toggleAddSide(s){
  addSide=addSide===s?'':s;
  document.getElementById('add-atk').className='side-btn'+(addSide==='attack'?' atk-on':'');
  document.getElementById('add-def').className='side-btn'+(addSide==='defense'?' def-on':'');
  addSelOps.clear(); addActiveCat='All';
  renderCats('add-cats','add-ops-hint','add-ops',addSide,addActiveCat,setAddCat);
  renderOps('add-ops',addSide,addActiveCat,addSelOps,toggleAddOp);
}

function toggleFindOp(op){findSelOps.has(op)?findSelOps.delete(op):findSelOps.add(op);renderOps('find-ops',findSide,findActiveCat,findSelOps,toggleFindOp);}
function toggleAddOp(op){addSelOps.has(op)?addSelOps.delete(op):addSelOps.add(op);renderOps('add-ops',addSide,addActiveCat,addSelOps,toggleAddOp);}
function clearFindOps(){findSelOps.clear();renderOps('find-ops',findSide,findActiveCat,findSelOps,toggleFindOp);}
function clearAddOps(){addSelOps.clear();renderOps('add-ops',addSide,addActiveCat,addSelOps,toggleAddOp);}

function runFind(){
  const map=document.getElementById('find-map').value;
  const objective=document.getElementById('find-obj').value;
  const results=strats.filter(s=>{
    if(map&&s.map!==map)return false;
    if(objective&&s.objective!==objective)return false;
    if(findSide&&s.side!==findSide)return false;
    if(findSelOps.size>0&&![...findSelOps].some(op=>s.operators.includes(op)))return false;
    return true;
  });
  const el=document.getElementById('find-results');
  el.innerHTML=results.length===0
    ?'<div class="empty"><i class="ti ti-mood-sad" aria-hidden="true"></i><br>No strats found matching filters.</div>'
    :`<p style="font-size:13px;color:var(--color-text-secondary);margin-bottom:10px">${results.length} strat${results.length!==1?'s':''} found</p>`+results.map(s=>stratCard(s,false)).join('');
}

function clearFind(){
  document.getElementById('find-map').value='';
  updateObjectiveOptions('find-map', 'find-obj', true);
  findSide=''; findSelOps.clear(); findActiveCat='All';
  document.getElementById('find-atk').className='side-btn';
  document.getElementById('find-def').className='side-btn';
  renderCats('find-cats','find-ops-hint','find-ops','',findActiveCat,setFindCat);
  document.getElementById('find-results').innerHTML='';
}

function getYTId(url){
  try{const u=new URL(url);if(u.hostname.includes('youtube.com'))return u.searchParams.get('v');if(u.hostname.includes('youtu.be'))return u.pathname.slice(1);}catch(e){}return null;
}
function linkIcon(url){
  try{const h=new URL(url).hostname;
    if(h.includes('youtube')||h.includes('youtu.be'))return 'ti-brand-youtube';
    if(h.includes('instagram'))return 'ti-brand-instagram';
    if(h.includes('reddit'))return 'ti-brand-reddit';
    if(h.includes('tiktok'))return 'ti-brand-tiktok';
    if(h.includes('twitter')||h.includes('x.com'))return 'ti-brand-x';
  }catch(e){}return 'ti-external-link';
}

function stratCard(s,showDelete){
  const ytId=getYTId(s.url);
  
  // Prioritize the uploaded custom image link, fall back to YouTube thumbnail if none uploaded
  let thumb = '';
  if (s.imageUrl) {
    thumb = `<img src="${s.imageUrl}" style="width:100%; max-height:240px; object-fit:cover; border-radius:var(--border-radius-md); margin-bottom:8px; display:block;" />`;
  } else if (ytId) {
    thumb = `<img src="https://img.youtube.com/vi/${ytId}/mqdefault.jpg" style="width:100%; border-radius:var(--border-radius-md); margin-bottom:8px; display:block;" />`;
  }
  
  const delBtn=showDelete?`<button class="btn btn-danger" style="padding:4px 10px;font-size:12px" data-delete-id="${s.id}"><i class="ti ti-trash" aria-hidden="true"></i></button>`:'';
  const opBadges=s.operators.map(op=>`<span class="badge b-op"><img src="${iconUrl(op)}" alt="" onerror="this.style.display='none'; this.nextElementSibling.style.display='inline'" /><span style="display:none; font-size:9px; font-weight:bold; margin-right:2px">${op.substring(0,2).toUpperCase()}</span>${op}</span>`).join('');
  const objBadge=s.objective?`<span class="badge b-obj"><i class="ti ti-target" style="font-size:11px" aria-hidden="true"></i> ${s.objective}</span>`:'';
  
  return `<div class="strat-card">
    ${thumb}
    <div style="display:flex;justify-content:space-between;align-items:flex-start">
      <span style="font-size:15px;font-weight:500">${s.title||s.map+' — '+(s.side==='attack'?'Attack':'Defense')}</span>
      ${delBtn}
    </div>
    <div class="strat-meta">
      <span class="badge b-map"><i class="ti ti-map-pin" style="font-size:11px" aria-hidden="true"></i> ${s.map}</span>
      ${objBadge}
      <span class="badge ${s.side==='attack'?'b-atk':'b-def'}">${s.side==='attack'?'Attack':'Defense'}</span>
      ${opBadges}
    </div>
    <a class="vid-link" href="${s.url}" target="_blank"><i class="ti ${linkIcon(s.url)}" aria-hidden="true"></i> Watch video</a>
  </div>`;
}

function renderAllList(){
  const el=document.getElementById('all-list');
  el.innerHTML=strats.length===0
    ?'<div class="empty">No strats saved yet. Add one to get started.</div>'
    :strats.map(s=>stratCard(s,true)).join('');
}

// SAVE DIRECTLY TO CLOUD DATABASE (WITH STORAGE UPLOAD HANDLING)
async function saveStrat(){
  const url=document.getElementById('add-url').value.trim();
  const map=document.getElementById('add-map').value;
  const objective=document.getElementById('add-obj').value;
  const msg=document.getElementById('add-msg');
  const imageFileInput = document.getElementById('add-image-file');
  
  const setMsg=(t,ok)=>{msg.style.color=ok?'var(--color-text-success)':'var(--color-text-danger)';msg.textContent=t;};
  
  if(!url){setMsg('Please paste a video URL.',false);return;}
  if(!map){setMsg('Please select a map.',false);return;}
  if(!objective){setMsg('Please select a target objective site.',false);return;}
  if(!addSide){setMsg('Please select attack or defense.',false);return;}
  
  setMsg('Uploading image and saving strat...', true);
  
  let finalImageUrl = '';

  try {
    // 1. Process local image file upload into Supabase Storage Bucket if selected
    if (imageFileInput.files && imageFileInput.files.length > 0) {
      const file = imageFileInput.files[0];
      
      const fileExt = file.name.split('.').pop();
      const fileName = `${Date.now()}-${Math.random().toString(36).substr(2, 9)}.${fileExt}`;
      const filePath = `uploads/${fileName}`;
      
      const { data: uploadData, error: uploadError } = await supabaseClient
        .storage
        .from('strat-images')
        .upload(filePath, file);
        
      if (uploadError) throw uploadError;
      
      const { data: publicUrlData } = supabaseClient
        .storage
        .from('strat-images')
        .getPublicUrl(filePath);
        
      finalImageUrl = publicUrlData.publicUrl;
    }

    // 2. Structure full payload data
    const newStrat = {
      id: Date.now().toString(),
      url,
      title: document.getElementById('add-title').value.trim(),
      imageUrl: finalImageUrl,
      map,
      objective,
      side: addSide,
      operators: [...addSelOps],
      added: Date.now()
    };

    // 3. Write data row to Supabase Database table
    const { error: dbError } = await supabaseClient.from('strats').insert({
      id: newStrat.id,
      payload: JSON.stringify(newStrat)
    });

    if (dbError) throw dbError;

    strats.push(newStrat);
    setMsg('Strat saved safely to cloud!',true);
    clearAddForm(true);
    renderAllList(); 
    updateCount();
    setTimeout(()=>switchTab('all'),600);
  } catch(e) {
    console.error("Complete save operation failed:", e);
    setMsg('Error saving: ' + (e.message || e), false);
  }
}

function clearAddForm(keepMsg){
  document.getElementById('add-url').value='';
  document.getElementById('add-title').value='';
  document.getElementById('add-image-file').value=''; // Resets file selection picker cleanly
  document.getElementById('add-map').value='';
  updateObjectiveOptions('add-map', 'add-obj', false);
  addSide=''; addSelOps.clear(); addActiveCat='All';
  document.getElementById('add-atk').className='side-btn';
  document.getElementById('add-def').className='side-btn';
  renderCats('add-cats','add-ops-hint','add-ops','',addActiveCat,setAddCat);
  if(!keepMsg)document.getElementById('add-msg').textContent='';
}

// DELETE DIRECTLY FROM CLOUD DATABASE
async function deleteStrat(id){
  const i=strats.findIndex(s=>s.id===id);
  if(i===-1)return;
  
  if (!confirm("Are you sure you want to delete this strategy? This action cannot be undone.")) {
    return;
  }
  
  try {
    const { error } = await supabaseClient.from('strats').delete().eq('id', id);
    if (error) throw error;

    strats.splice(i,1);
    renderAllList(); 
    updateCount();
  } catch(e) {
    alert("Could not delete strategy from cloud: " + e.message);
  }
}

function switchTab(t){
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',['find','add','all'][i]===t));
  document.querySelectorAll('.section').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  if(t==='all')renderAllList();
}

document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('.tabs .tab').forEach(tab => {
    tab.addEventListener('click', () => {
      switchTab(tab.getAttribute('data-tab'));
    });
  });

  document.getElementById('find-map').addEventListener('change', () => updateObjectiveOptions('find-map', 'find-obj', true));
  document.getElementById('add-map').addEventListener('change', () => updateObjectiveOptions('add-map', 'add-obj', false));

  document.getElementById('find-atk').addEventListener('click', () => toggleFindSide('attack'));
  document.getElementById('find-def').addEventListener('click', () => toggleFindSide('defense'));
  document.getElementById('btn-clear-find-ops').addEventListener('click', clearFindOps);
  document.getElementById('btn-run-find').addEventListener('click', runFind);
  document.getElementById('btn-clear-find').addEventListener('click', clearFind);

  document.getElementById('add-atk').addEventListener('click', () => toggleAddSide('attack'));
  document.getElementById('add-def').addEventListener('click', () => toggleAddSide('defense'));
  document.getElementById('btn-clear-add-ops').addEventListener('click', clearAddOps);
  document.getElementById('btn-save-strat').addEventListener('click', saveStrat);
  document.getElementById('btn-clear-add-form').addEventListener('click', () => clearAddForm(false));

  const captureDelete = (e) => {
    const targetButton = e.target.closest('[data-delete-id]');
    if (targetButton) {
      deleteStrat(targetButton.getAttribute('data-delete-id'));
    }
  };
  document.getElementById('all-list').addEventListener('click', captureDelete);
  document.getElementById('find-results').addEventListener('click', captureDelete);

  load();
  updateObjectiveOptions('find-map', 'find-obj', true);
  updateObjectiveOptions('add-map', 'add-obj', false);
});
</script>
